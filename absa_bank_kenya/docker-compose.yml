version: '3.8'

services:
  postgres-absa:
    image: postgres:15
    environment:
      POSTGRES_USER: ${DB_USER:-absa_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-absa_password}
      POSTGRES_DB: ${DB_NAME:-absa_warehouse}
    ports:
      - "5432:5432"
    volumes:
      - postgres_absa_data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh

  airflow-absa:
    image: apache/airflow:2.7.1-python3.11
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${DB_USER:-absa_admin}:${DB_PASSWORD:-absa_password}@postgres-absa:5432/${DB_NAME:-absa_warehouse}
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    volumes:
      - ./dags:/opt/airflow/dags
      - ./dbt:/opt/airflow/dbt
      - .:/opt/airflow/projects/absa
    ports:
      - "8081:8080"
    depends_on:
      - postgres-absa

  absa-dashboard:
    image: python:3.11-slim
    command: bash -c "pip install streamlit plotly pandas sqlalchemy psycopg2-binary && streamlit run dashboard_app.py --server.port 8501 --server.address 0.0.0.0"
    ports:
      - "8501:8501"
    environment:
      - STREAMLIT_SERVER_HEADLESS=true
      - DB_HOST=postgres-absa
    volumes:
      - .:/app
    working_dir: /app
    depends_on:
      - postgres-absa

volumes:
  postgres_absa_data:
