server {
    listen 80;
    server_name 54.193.78.115;

    access_log /var/log/nginx/mpesa_access.log;
    error_log /var/log/nginx/mpesa_error.log warn;

    client_max_body_size 10m;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location = / {
        return 200 "M-Pesa streaming pipeline is live. Use /health, /webhook/*, /ui, or /grafana/.\n";
        add_header Content-Type text/plain;
    }

    location = /health {
        proxy_pass http://127.0.0.1:5000/health;
    }

    location /webhook/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
    }

    location /ui {
        proxy_pass http://127.0.0.1:5000;
    }

    location = /grafana {
        return 301 /grafana/;
    }

    location /grafana/ {
        allow 127.0.0.1;
        allow 102.216.154.31;
        deny all;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 90s;
    }
}
