---
# Webhook service deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: webhook
  namespace: mpesa-pipeline
  labels:
    app: webhook
    component: ingestion
    version: v1
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: webhook
  template:
    metadata:
      labels:
        app: webhook
        component: ingestion
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8888"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: webhook-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      
      imagePullSecrets:
      - name: docker-registry
      
      containers:
      - name: webhook
        image: "us-central1-docker.pkg.dev/${GCP_PROJECT_ID}/mpesa-docker/webhook:latest"
        imagePullPolicy: IfNotPresent
        
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        - name: https
          containerPort: 8443
          protocol: TCP
        - name: metrics
          containerPort: 8888
          protocol: TCP
        
        env:
        - name: ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: mpesa-config
              key: ENVIRONMENT
        - name: GCP_PROJECT_ID
          valueFrom:
            configMapKeyRef:
              name: mpesa-config
              key: GCP_PROJECT_ID
        - name: GCP_REGION
          valueFrom:
            configMapKeyRef:
              name: mpesa-config
              key: GCP_REGION
        - name: PUBSUB_TRANSACTIONS_TOPIC
          valueFrom:
            configMapKeyRef:
              name: mpesa-config
              key: PUBSUB_TRANSACTIONS_TOPIC
        - name: PUBSUB_DLQ_TOPIC
          valueFrom:
            configMapKeyRef:
              name: mpesa-config
              key: PUBSUB_DLQ_TOPIC
        - name: BIGQUERY_RAW_DATASET
          valueFrom:
            configMapKeyRef:
              name: mpesa-config
              key: BIGQUERY_RAW_DATASET
        - name: BIGQUERY_RAW_TABLE
          valueFrom:
            configMapKeyRef:
              name: mpesa-config
              key: BIGQUERY_RAW_TABLE
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: mpesa-config
              key: LOG_LEVEL
        - name: WEBHOOK_TIMEOUT
          valueFrom:
            configMapKeyRef:
              name: mpesa-config
              key: WEBHOOK_TIMEOUT
        
        # Secrets
        - name: DARAJA_API_KEY
          valueFrom:
            secretKeyRef:
              name: daraja-credentials
              key: api-key
        - name: DARAJA_API_SECRET
          valueFrom:
            secretKeyRef:
              name: daraja-credentials
              key: api-secret
        - name: WEBHOOK_SIGNING_KEY
          valueFrom:
            secretKeyRef:
              name: webhook-signing-key
              key: key
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: connection-string
        
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        
        startupProbe:
          httpGet:
            path: /startup
            port: http
          initialDelaySeconds: 0
          periodSeconds: 2
          timeoutSeconds: 3
          failureThreshold: 30
        
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: cache
          mountPath: /app/cache
        - name: logs
          mountPath: /app/logs
      
      volumes:
      - name: tmp
        emptyDir: {}
      - name: cache
        emptyDir: {}
      - name: logs
        emptyDir: {}
      
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - webhook
              topologyKey: kubernetes.io/hostname
      
      tolerations:
      - key: "workload"
        operator: "Equal"
        value: "ingestion"
        effect: "NoSchedule"
      
      terminationGracePeriodSeconds: 30

---
# Pod Disruption Budget for webhook
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: webhook-pdb
  namespace: mpesa-pipeline
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: webhook

---
# Horizontal Pod Autoscaler for webhook
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: webhook-hpa
  namespace: mpesa-pipeline
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: webhook
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
      - type: Pods
        value: 2
        periodSeconds: 15
      selectPolicy: Max
