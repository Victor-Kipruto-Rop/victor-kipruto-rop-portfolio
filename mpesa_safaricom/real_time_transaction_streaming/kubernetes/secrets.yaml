---
# Daraja API credentials
apiVersion: v1
kind: Secret
metadata:
  name: daraja-credentials
  namespace: mpesa-pipeline
  labels:
    app: mpesa-pipeline
    component: ingestion
type: Opaque
stringData:
  api-key: "PLACEHOLDER_DARAJA_API_KEY"
  api-secret: "PLACEHOLDER_DARAJA_API_SECRET"
  api-endpoint: "https://api.safaricom.co.ke"

---
# Webhook signing key
apiVersion: v1
kind: Secret
metadata:
  name: webhook-signing-key
  namespace: mpesa-pipeline
  labels:
    app: webhook
    component: ingestion
type: Opaque
stringData:
  key: "PLACEHOLDER_WEBHOOK_SIGNING_KEY"
  algorithm: "HS256"

---
# Cloud SQL credentials
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: mpesa-pipeline
  labels:
    app: mpesa-pipeline
    component: database
type: Opaque
stringData:
  username: "mpesa_app"
  password: "PLACEHOLDER_CLOUD_SQL_APP_PASSWORD"
  host: "PLACEHOLDER_CLOUD_SQL_HOST"
  port: "5432"
  database: "mpesa_${ENVIRONMENT}"
  connection-string: "postgresql://mpesa_app:PLACEHOLDER_CLOUD_SQL_APP_PASSWORD@PLACEHOLDER_CLOUD_SQL_HOST:5432/mpesa_${ENVIRONMENT}"

---
# Pub/Sub Service Account Key (for non-GKE clusters)
apiVersion: v1
kind: Secret
metadata:
  name: pubsub-credentials
  namespace: mpesa-pipeline
  labels:
    app: mpesa-pipeline
    component: streaming
type: Opaque
stringData:
  gcp-service-account-key.json: |
    {
      "type": "PLACEHOLDER",
      "project_id": "PLACEHOLDER_GCP_PROJECT_ID",
      "private_key_id": "PLACEHOLDER",
      "private_key": "PLACEHOLDER",
      "client_email": "PLACEHOLDER",
      "client_id": "PLACEHOLDER",
      "auth_uri": "https://accounts.google.com/o/oauth2/auth",
      "token_uri": "https://oauth2.googleapis.com/token",
      "auth_provider_x509_cert_url": "https://www.googleapis.com/oauth2/v1/certs",
      "client_x509_cert_url": "PLACEHOLDER"
    }

---
# BigQuery Service Account Key (for non-GKE clusters)
apiVersion: v1
kind: Secret
metadata:
  name: bigquery-credentials
  namespace: mpesa-pipeline
  labels:
    app: mpesa-pipeline
    component: analytics
type: Opaque
stringData:
  gcp-service-account-key.json: |
    {
      "type": "PLACEHOLDER",
      "project_id": "PLACEHOLDER_GCP_PROJECT_ID",
      "private_key_id": "PLACEHOLDER",
      "private_key": "PLACEHOLDER",
      "client_email": "PLACEHOLDER",
      "client_id": "PLACEHOLDER",
      "auth_uri": "https://accounts.google.com/o/oauth2/auth",
      "token_uri": "https://oauth2.googleapis.com/token",
      "auth_provider_x509_cert_url": "https://www.googleapis.com/oauth2/v1/certs",
      "client_x509_cert_url": "PLACEHOLDER"
    }

---
# TLS Certificate for HTTPS (self-signed example)
apiVersion: v1
kind: Secret
metadata:
  name: webhook-tls
  namespace: mpesa-pipeline
  labels:
    app: webhook
    component: ingestion
type: kubernetes.io/tls
stringData:
  tls.crt: |
    -----BEGIN CERTIFICATE-----
    PLACEHOLDER_CERTIFICATE_CONTENT
    -----END CERTIFICATE-----
  tls.key: |
    -----BEGIN PRIVATE KEY-----
    PLACEHOLDER_PRIVATE_KEY_CONTENT
    -----END PRIVATE KEY-----

---
# Docker registry credentials (if using private registry)
apiVersion: v1
kind: Secret
metadata:
  name: docker-registry
  namespace: mpesa-pipeline
  labels:
    app: mpesa-pipeline
    component: deployment
type: kubernetes.io/dockercfg
stringData:
  .dockercfg: |
    {
      "us-central1-docker.pkg.dev": {
        "username": "_json_key",
        "password": "PLACEHOLDER_DOCKER_CREDENTIALS",
        "auth": "X2pzb25fa2V5OlBMQUNFSE9MREVSX0RPQ0tFUl9DUkVERU5USUFMUA=="
      }
    }

---
# Encryption key for sensitive data
apiVersion: v1
kind: Secret
metadata:
  name: encryption-key
  namespace: mpesa-pipeline
  labels:
    app: mpesa-pipeline
    component: security
type: Opaque
stringData:
  encryption-key: "PLACEHOLDER_ENCRYPTION_KEY_32_BYTES"
  encryption-algorithm: "AES-256-GCM"

---
# OAuth tokens for external services
apiVersion: v1
kind: Secret
metadata:
  name: oauth-tokens
  namespace: mpesa-pipeline
  labels:
    app: mpesa-pipeline
    component: external-services
type: Opaque
stringData:
  github-token: "PLACEHOLDER_GITHUB_TOKEN"
  slack-webhook: "PLACEHOLDER_SLACK_WEBHOOK"
  datadog-api-key: "PLACEHOLDER_DATADOG_API_KEY"
