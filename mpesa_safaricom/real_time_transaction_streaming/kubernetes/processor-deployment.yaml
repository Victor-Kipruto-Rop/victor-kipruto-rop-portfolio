---
# Processor service deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: processor
  namespace: mpesa-pipeline
  labels:
    app: processor
    component: analytics
    version: v1
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: processor
  template:
    metadata:
      labels:
        app: processor
        component: analytics
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8888"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: processor-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      
      imagePullSecrets:
      - name: docker-registry
      
      containers:
      - name: processor
        image: "us-central1-docker.pkg.dev/${GCP_PROJECT_ID}/mpesa-docker/processor:latest"
        imagePullPolicy: IfNotPresent
        
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        - name: metrics
          containerPort: 8888
          protocol: TCP
        
        env:
        - name: ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: mpesa-config
              key: ENVIRONMENT
        - name: GCP_PROJECT_ID
          valueFrom:
            configMapKeyRef:
              name: mpesa-config
              key: GCP_PROJECT_ID
        - name: GCP_REGION
          valueFrom:
            configMapKeyRef:
              name: mpesa-config
              key: GCP_REGION
        - name: PUBSUB_ENRICHED_SUB
          valueFrom:
            configMapKeyRef:
              name: mpesa-config
              key: PUBSUB_ENRICHED_SUB
        - name: BIGQUERY_ANALYTICS_DATASET
          valueFrom:
            configMapKeyRef:
              name: mpesa-config
              key: BIGQUERY_ANALYTICS_DATASET
        - name: BIGQUERY_MART_TABLE
          valueFrom:
            configMapKeyRef:
              name: mpesa-config
              key: BIGQUERY_MART_TABLE
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: mpesa-config
              key: LOG_LEVEL
        - name: BATCH_SIZE
          valueFrom:
            configMapKeyRef:
              name: mpesa-config
              key: BATCH_SIZE
        
        # Secrets
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: connection-string
        - name: PUBSUB_CREDENTIALS
          valueFrom:
            secretKeyRef:
              name: pubsub-credentials
              key: gcp-service-account-key.json
        
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 2000m
            memory: 2Gi
        
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 15
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: cache
          mountPath: /app/cache
        - name: models
          mountPath: /app/models
        - name: logs
          mountPath: /app/logs
      
      volumes:
      - name: tmp
        emptyDir: {}
      - name: cache
        emptyDir: {}
      - name: models
        emptyDir: {}
      - name: logs
        emptyDir: {}
      
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - processor
              topologyKey: kubernetes.io/hostname
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 50
            preference:
              matchExpressions:
              - key: cloud.google.com/gke-nodepool
                operator: In
                values:
                - analytics-pool
      
      tolerations:
      - key: "workload"
        operator: "Equal"
        value: "analytics"
        effect: "NoSchedule"
      
      terminationGracePeriodSeconds: 60

---
# Pod Disruption Budget for processor
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: processor-pdb
  namespace: mpesa-pipeline
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: processor

---
# Horizontal Pod Autoscaler for processor
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: processor-hpa
  namespace: mpesa-pipeline
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: processor
  minReplicas: 2
  maxReplicas: 8
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 75
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 2
        periodSeconds: 30
      selectPolicy: Max
