name: 01_real_time_transaction_streaming

services:
  postgres:
    image: postgres:15-alpine
    container_name: mpesa_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mpesa_analytics}
      POSTGRES_USER: ${POSTGRES_USER:-data_engineer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U data_engineer"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: mpesa_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_SYNC_LIMIT: 2
      ZOOKEEPER_INIT_LIMIT: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: mpesa_kafka
    depends_on:
      - zookeeper
    ports:
      - "${KAFKA_HOST_PORT:-9092}:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:${KAFKA_HOST_PORT:-9092}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "kafka:29092"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mpesa_redis
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:${GRAFANA_VERSION:-latest}
    container_name: mpesa_grafana
    ports:
      - "${GRAFANA_HOST_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin123}
      GF_USERS_DEFAULT_THEME: dark
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/executive_command_center.json
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_ANALYTICS_CHECK_FOR_PLUGIN_UPDATES: "false"
      GF_PLUGINS_PREINSTALL_DISABLED: "true"
      GF_SERVER_ROOT_URL: ${GRAFANA_URL:-http://localhost:3000}
      GF_SERVER_SERVE_FROM_SUB_PATH: ${GRAFANA_SERVE_FROM_SUB_PATH:-false}
      POSTGRES_DB: ${POSTGRES_DB:-mpesa_analytics}
      POSTGRES_USER: ${POSTGRES_USER:-data_engineer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro

  webhook-receiver:
    build:
      context: .
      dockerfile: Dockerfile.webhook
    container_name: mpesa_webhook
    ports:
      - "${WEBHOOK_HOST_PORT:-5000}:5000"
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DARAJA_ENVIRONMENT: ${DARAJA_ENVIRONMENT:-sandbox}
      DARAJA_CONSUMER_KEY: ${DARAJA_CONSUMER_KEY:-}
      DARAJA_CONSUMER_SECRET: ${DARAJA_CONSUMER_SECRET:-}
      DARAJA_BUSINESS_SHORTCODE: ${DARAJA_BUSINESS_SHORTCODE:-}
      DARAJA_SHORTCODE: ${DARAJA_SHORTCODE:-}
      DARAJA_C2B_SHORTCODE: ${DARAJA_C2B_SHORTCODE:-}
      DARAJA_PASSKEY: ${DARAJA_PASSKEY:-}
      DARAJA_RESPONSE_TYPE: ${DARAJA_RESPONSE_TYPE:-Completed}
      DOMAIN: ${DOMAIN:-}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
      DARAJA_VALIDATION_URL: ${DARAJA_VALIDATION_URL:-}
      DARAJA_CONFIRMATION_URL: ${DARAJA_CONFIRMATION_URL:-}
      DARAJA_B2C_RESULT_URL: ${DARAJA_B2C_RESULT_URL:-}
      DARAJA_B2C_TIMEOUT_URL: ${DARAJA_B2C_TIMEOUT_URL:-}
      DARAJA_STK_CALLBACK_URL: ${DARAJA_STK_CALLBACK_URL:-}
      C2B_VALIDATION_URL: ${C2B_VALIDATION_URL:-}
      C2B_CONFIRMATION_URL: ${C2B_CONFIRMATION_URL:-}
      MPESA_BUSINESS_SHORTCODE: ${MPESA_BUSINESS_SHORTCODE:-}
      MPESA_PASSKEY: ${MPESA_PASSKEY:-}
      CALLBACK_URL: ${CALLBACK_URL:-}
      KAFKA_BROKERS: kafka:29092
      KAFKA_TOPIC_TRANSACTIONS: ${KAFKA_TOPIC_TRANSACTIONS:-mpesa-transactions}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-mpesa_analytics}
      POSTGRES_USER: ${POSTGRES_USER:-data_engineer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      UI_TOKEN: ${UI_TOKEN:-}
      RATE_LIMIT_PER_MIN: ${RATE_LIMIT_PER_MIN:-120}
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./ingestion:/app/ingestion:ro
      - ./schemas:/app/schemas:ro

  kafka-consumer:
    build:
      context: .
      dockerfile: Dockerfile.consumer
    container_name: mpesa_kafka_consumer
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      KAFKA_BROKERS: kafka:29092
      KAFKA_TOPIC_TRANSACTIONS: ${KAFKA_TOPIC_TRANSACTIONS:-mpesa-transactions}
      KAFKA_GROUP_ID: ${KAFKA_GROUP_ID:-mpesa_streaming_group}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-mpesa_analytics}
      POSTGRES_USER: ${POSTGRES_USER:-data_engineer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./streaming:/app/streaming:ro
      - ./schemas:/app/schemas:ro

  dbt:
    image: ghcr.io/dbt-labs/dbt-postgres:latest
    container_name: mpesa_dbt
    profiles: ["tools"]
    working_dir: /app/dbt
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-mpesa_analytics}
      POSTGRES_USER: ${POSTGRES_USER:-data_engineer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./dbt:/app/dbt

  jupyter:
    image: jupyter/minimal-notebook:latest
    container_name: mpesa_jupyter
    profiles: ["tools"]
    ports:
      - "${JUPYTER_HOST_PORT:-8888}:8888"
    environment:
      JUPYTER_ENABLE_LAB: "yes"
    volumes:
      - ./notebooks:/home/jovyan/work

volumes:
  postgres_data:
  grafana_data:

networks:
  default:
    name: mpesa_network
