version: '3.8'

services:
  postgres-kcb:
    image: postgres:15
    environment:
      POSTGRES_USER: ${DB_USER:-kcb_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-kcb_password}
      POSTGRES_DB: ${DB_NAME:-kcb_warehouse}
    ports:
      - "5436:5432"
    volumes:
      - postgres_kcb_data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh

  airflow-kcb:
    image: apache/airflow:2.7.1-python3.11
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${DB_USER:-kcb_admin}:${DB_PASSWORD:-kcb_password}@postgres-kcb:5432/${DB_NAME:-kcb_warehouse}
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    volumes:
      - ./dags:/opt/airflow/dags
      - ./dbt:/opt/airflow/dbt
      - .:/opt/airflow/projects/kcb
    ports:
      - "8083:8080"
    depends_on:
      - postgres-kcb

  kcb-dashboard:
    image: python:3.11-slim
    command: bash -c "pip install streamlit plotly pandas sqlalchemy psycopg2-binary && streamlit run dashboard_app.py --server.port 8503 --server.address 0.0.0.0"
    ports:
      - "8503:8503"
    environment:
      - STREAMLIT_SERVER_HEADLESS=true
      - DB_HOST=postgres-kcb
    volumes:
      - .:/app
    working_dir: /app
    depends_on:
      - postgres-kcb

volumes:
  postgres_kcb_data:
